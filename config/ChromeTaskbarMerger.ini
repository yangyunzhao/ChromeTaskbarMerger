; ChromeTaskbarMerger portable configuration
; Changes take effect after the application is restarted.

[ChromeTaskbarMerger]
; Allowed range: 500 to 60000 milliseconds. Default: 2000.
scan_interval_ms=2000

; How often to look for WindowTabs while waiting. Allowed: 500 to 60000.
windowtabs_check_interval_ms=3000

; Start this portable copy when the current user signs in to Windows.
; The tray menu updates this value and the per-user Windows Run entry together.
start_with_windows=false
