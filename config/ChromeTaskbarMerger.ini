; ChromeTaskbarMerger portable configuration
; Changes take effect after the application is restarted.

[ChromeTaskbarMerger]
; Allowed range: 500 to 60000 milliseconds. Default: 2000.
scan_interval_ms=2000

; Choose exactly one tab provider: builtin or windowtabs.
; Built-in is the V2 default and does not require WindowTabs.
tab_provider=builtin

; Remember custom built-in tab names by the local Chrome profile.
; Disabled by default. WindowTabs ignores this setting.
; The persisted file contains only a hashed profile key and the custom name.
persist_tab_names_by_profile=false

; How often to look for WindowTabs while that provider is selected.
; Allowed: 500 to 60000. Ignored by the built-in provider.
windowtabs_check_interval_ms=3000

; Built-in tab strip alignment: left, center, or right.
tab_strip_alignment=right

; Built-in tab strip total width as a percentage. Allowed: 25 to 100.
tab_strip_width_percent=60

; Built-in maximum width of one tab in logical pixels. Allowed: 80 to 400.
tab_width_px=180

; Start this portable copy when the current user signs in to Windows.
; The tray menu updates this value and the per-user Windows Run entry together.
start_with_windows=false
